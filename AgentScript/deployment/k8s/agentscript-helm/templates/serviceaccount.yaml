{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentscript.serviceAccountName" . }}
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentscript.fullname" . }}
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
rules:
# Allow reading ConfigMaps (agent definitions)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Allow reading Secrets (API keys)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
# Allow reading Pods (for discovery and logging)
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
# Allow creating Events (for audit trail)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Allow reading other Statefulset replicas (for inter-agent communication)
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agentscript.fullname" . }}
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agentscript.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "agentscript.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
