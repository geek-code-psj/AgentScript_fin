apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentscript.fullname" . }}
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "agentscript.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentscript.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "agentscript.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agentscript.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.otel.jaegerEndpoint | quote }}
        {{- if .Values.langsmith.enabled }}
        - name: LANGSMITH_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "agentscript.fullname" . }}-langsmith
              key: api-key
        - name: LANGSMITH_ORG_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "agentscript.fullname" . }}-langsmith
              key: org-id
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: trace-store
          mountPath: /var/lib/agentscript/traces
        - name: agents-config
          mountPath: /etc/agentscript/agents
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: agents-config
        configMap:
          name: {{ include "agentscript.fullname" . }}-agents
          defaultMode: 0555
      - name: tmp
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
  - metadata:
      name: trace-store
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.statefulSet.storageClassName }}
      resources:
        requests:
          storage: {{ .Values.statefulSet.storageSize }}
