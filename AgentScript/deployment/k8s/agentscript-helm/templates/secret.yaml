apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentscript.fullname" . }}-langsmith
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.langsmith.apiKey }}
  api-key: {{ .Values.langsmith.apiKey | b64enc | quote }}
  {{- else }}
  api-key: ""
  {{- end }}
  {{- if .Values.langsmith.orgId }}
  org-id: {{ .Values.langsmith.orgId | b64enc | quote }}
  {{- else }}
  org-id: ""
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentscript.fullname" . }}-api-keys
  labels:
    {{- include "agentscript.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.openai.apiKey }}
  openai-api-key: {{ .Values.secrets.openai.apiKey | b64enc | quote }}
  {{- else }}
  openai-api-key: ""
  {{- end }}
  {{- if .Values.secrets.anthropic.apiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropic.apiKey | b64enc | quote }}
  {{- else }}
  anthropic-api-key: ""
  {{- end }}
  {{- if .Values.secrets.together.apiKey }}
  together-api-key: {{ .Values.secrets.together.apiKey | b64enc | quote }}
  {{- else }}
  together-api-key: ""
  {{- end }}
