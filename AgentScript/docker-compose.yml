services:
  agentscript:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENTSCRIPT_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8000,http://localhost:8000
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
    volumes:
      - agentscript-data:/data
    restart: unless-stopped

volumes:
  agentscript-data:
